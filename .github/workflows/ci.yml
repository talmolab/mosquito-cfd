name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # examples/prelim_sweep/ is load-bearing for this step: ruff errors (E902) on a
      # missing path, so a rename/move of that dir must update these two run lines too.
      - name: Lint with ruff
        run: uv run ruff check src/ tests/ examples/prelim_sweep/

      - name: Check formatting with ruff
        run: uv run ruff format --check src/ tests/ examples/prelim_sweep/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -v || [ $? -eq 5 ]  # Exit code 5 = no tests collected (OK for now)

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.fp32
          failure-threshold: error

      - name: Lint FP64 Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.fp64
          failure-threshold: error

      - name: Lint Python Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.python
          failure-threshold: error